<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta property="og:title" content="🌸 貸款計算器">
<meta property="og:description" content="輸入金額立即試算，3秒搞定">
<meta property="og:image" content="👉貼你的圖片網址">
<meta property="og:url" content="https://enenxixi-ux.github.io/sakura-loan-calculator/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>貸款計算器 ｜ Loan Calculator</title>
<!-- 引入截圖工具庫 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --sakura-dark:  #D86A8A; 
    --sakura-mid:   #FFB7C5; 
    --sakura-light: #FFDDE2; 
    --sakura-pale:  #FFF5F7; 
    --gold:         #D4AF37; 
    --white:        #FFFFFF;
    --text:         #5D3B42; 
    --text-muted:   #A68B90;
    --border:       #F2D5DA;
    --shadow:       0 8px 30px rgba(216, 106, 138, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: var(--sakura-pale);
    color: var(--text);
    font-family: "PingFang TC", "Lantinghei TC", "Microsoft JhengHei Light", "Microsoft JhengHei", sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-x: hidden;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  #sakura-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .petal {
    position: absolute;
    background: var(--sakura-mid);
    border-radius: 150% 0 150% 0;
    opacity: 0.6;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* 橫幅縮小寬度 40% (剩下 60%) */
  header {
    background: linear-gradient(135deg, #FFB7C5 0%, #D86A8A 100%);
    width: 60%;
    margin: 0 auto;
    padding: 30px 20px;
    text-align: center;
    position: relative;
    border-bottom: 3px solid var(--gold);
    border-radius: 0 0 25px 25px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  header h1 {
    font-size: 20px;
    color: var(--white);
    letter-spacing: 0.05em;
    font-weight: 200;
  }
  header h1 span {
    display: block;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    opacity: 0.9;
  }

  /* 橫幅按鈕：調整為對稱的固定寬度 */
  .btn-ui {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid var(--white);
    color: var(--white);
    width: 78px;       /* 固定寬度確保左右一致 */
    height: 30px;      /* 固定高度 */
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 300;
    z-index: 10;
  }
  .btn-ui:hover { background: var(--white); color: var(--sakura-dark); }
  .btn-ui:active { transform: translateY(-50%) scale(0.95); }
  
  .screenshot-btn { left: 15px; } 
  .reset-btn { right: 15px; }      

  .wrap { position: relative; z-index: 2; padding: 24px 20px; max-width: 520px; margin: 0 auto; }

  .card {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    margin-top: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--white);
  }
  .input-grid { display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 15px; }
  .field label {
    display: block; font-size: 11px; font-weight: 500;
    color: var(--sakura-dark); margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-wrap input {
    width: 100%; border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 12px; font-size: 18px; font-family: 'DM Mono', monospace;
    color: var(--text); outline: none; background: var(--white);
    transition: border-color 0.3s;
  }
  .input-wrap input:focus { border-color: var(--sakura-dark); }
  .input-unit {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 12px; color: var(--sakura-dark); pointer-events: none;
  }

  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
  .sum-box {
    background: var(--white); border-radius: 15px; padding: 20px;
    text-align: center; border: 1px solid var(--sakura-light);
  }
  .sum-label { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; }
  .sum-value { font-size: 22px; font-family: 'DM Mono', monospace; color: var(--sakura-dark); font-weight: 500; }
  .sum-value span { font-size: 12px; margin-left: 2px; }

  .table-container {
    background: var(--white); border-radius: 15px; overflow: hidden;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .table-head { background: var(--sakura-light); display: grid; grid-template-columns: 50px 1fr 1fr 1fr; padding: 12px 10px; }
  .th { font-size: 10px; color: var(--sakura-dark); font-weight: 700; text-align: right; }
  .th:first-child { text-align: left; }
  .table-body { max-height: 250px; overflow-y: auto; }
  .tr { display: grid; grid-template-columns: 50px 1fr 1fr 1fr; padding: 12px 10px; border-bottom: 1px solid var(--sakura-pale); }
  .td { font-size: 12px; font-family: 'DM Mono', monospace; text-align: right; }
  .td:first-child { text-align: left; color: var(--text-muted); }

  .footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 40px;
    line-height: 2;
  }
  .footer .highlight { color: var(--sakura-dark); font-size: 10px; }

  @media (max-width: 480px) { header { width: 90%; } }
</style>
</head>
<body>

<div id="sakura-canvas"></div>

<header>
  <button class="btn-ui screenshot-btn" onclick="takeScreenshot()">截圖</button>
  <h1>貸款計算器 <span>Loan Calculator</span></h1>
  <button class="btn-ui reset-btn" onclick="resetForm()">清除重算</button>
</header>

<div class="wrap">
  <div class="card">
    <div class="input-grid">
      <div class="field">
        <label>貸款金額</label>
        <div class="input-wrap">
          <input type="number" id="principal" placeholder="0" step="1" inputmode="numeric">
          <span class="input-unit">萬元</span>
        </div>
      </div>
      <div class="field">
        <label>還款期數</label>
        <div class="input-wrap">
          <input type="number" id="periods" placeholder="0" step="1" inputmode="numeric">
          <span class="input-unit">期</span>
        </div>
      </div>
      <div class="field">
        <label>年利率</label>
        <div class="input-wrap">
          <input type="number" id="rate" placeholder="0" step="0.01" inputmode="decimal">
          <span class="input-unit">%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="summary">
    <div class="sum-box">
      <div class="sum-label">每月支付金</div>
      <div class="sum-value" id="monthly">—<span>元</span></div>
    </div>
    <div class="sum-box">
      <div class="sum-label">總利息支出</div>
      <div class="sum-value" id="total_interest">—<span>元</span></div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-head">
      <div class="th">期數</div>
      <div class="th">月付額</div>
      <div class="th">利息</div>
      <div class="th">剩餘本金</div>
    </div>
    <div id="table_body" class="table-body"></div>
  </div>

  <div class="footer">
    🌸 SAKURA LOAN CALCULATOR 🌸<br>
    <div class="highlight">
      *本試算按銀行本息均攤計算*<br>
      *試算結果僅供參考，實際以銀行估算為準*
    </div>
  </div>
</div>

<script>
// 1. 截圖功能
function takeScreenshot() {
  const btnScreenshot = document.querySelector('.screenshot-btn');
  const btnReset = document.querySelector('.reset-btn');
  
  // 截圖前暫時隱藏按鈕
  btnScreenshot.style.visibility = 'hidden';
  btnReset.style.visibility = 'hidden';

  html2canvas(document.body, {
    backgroundColor: "#FFF5F7",
    scale: 2 
  }).then(canvas => {
    btnScreenshot.style.visibility = 'visible';
    btnReset.style.visibility = 'visible';

    const link = document.createElement('a');
    link.download = '貸款試算結果.png';
    link.href = canvas.toDataURL("image/png");
    link.click();
    
    alert("截圖已生成。手機用戶請在下載後開啟圖片並長按儲存至相簿。");
  });
}

// 2. 櫻花動畫
function createPetal() {
  const container = document.getElementById('sakura-canvas');
  const petal = document.createElement('div');
  petal.className = 'petal';
  const size = Math.random() * 10 + 8;
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.width = size + 'px';
  petal.style.height = size + 'px';
  petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
  petal.style.animationDelay = Math.random() * 5 + 's';
  container.appendChild(petal);
  setTimeout(() => petal.remove(), 10000);
}
setInterval(createPetal, 500);

// 3. 清除歸零
function resetForm() {
  document.getElementById('principal').value = '';
  document.getElementById('periods').value = '';
  document.getElementById('rate').value = '';
  calculate();
}

function fmt(n) { return Math.round(n).toLocaleString('zh-TW'); }

// 4. 貸款計算 (本息平均攤還：40萬/60期/5% -> 52910)
function calculate() {
  const pVal = document.getElementById('principal').value;
  const nVal = document.getElementById('periods').value;
  const rVal = document.getElementById('rate').value;

  if (!pVal || !nVal || !rVal) {
    document.getElementById('monthly').innerHTML = '—<span>元</span>';
    document.getElementById('total_interest').innerHTML = '—<span>元</span>';
    document.getElementById('table_body').innerHTML = '';
    return;
  }

  const P = parseFloat(pVal) * 10000;
  const n = parseInt(nVal);
  const annualRate = parseFloat(rVal);
  const r = annualRate / 100 / 12;

  let mp = (r === 0) ? P / n : P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

  document.getElementById('monthly').innerHTML = fmt(mp) + '<span>元</span>';

  let balance = P;
  let totalInterest = 0;
  let html = '';

  for (let i = 1; i <= n; i++) {
    const interest = balance * r;
    const principal = mp - interest;
    totalInterest += interest;
    balance -= principal;
    if (i === n) balance = 0;

    html += `<div class="tr">
      <div class="td">${i}</div>
      <div class="td">${fmt(mp)}</div>
      <div class="td" style="color:var(--sakura-dark)">${fmt(interest)}</div>
      <div class="td">${fmt(Math.max(0, balance))}</div>
    </div>`;
  }
  document.getElementById('total_interest').innerHTML = fmt(totalInterest) + '<span>元</span>';
  document.getElementById('table_body').innerHTML = html;
}

['principal', 'periods', 'rate'].forEach(id => {
  document.getElementById(id).addEventListener('input', calculate);
});

// 初始開啟歸零
calculate();
</script>
</body>
</html>
